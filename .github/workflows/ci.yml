name: CI

# Se ejecuta en cada push a `develop` (rama de trabajo del TFG).
# Ejecuta toda la suite de tests del backend como feedback continuo, SIN desplegar.
# El análisis de calidad (SonarCloud) NO se hace aquí, sino sobre `main` en `release.yml`,
# porque la foto de calidad que interesa es la del código final/desplegado.
#
# El despliegue lo hace `release.yml` cuando subes una etiqueta `deploy-*`:
# ese workflow vuelve a correr los tests y, si pasan, promociona el commit a `main`,
# lo que dispara el despliegue en Render (Auto-Deploy = "On Commit" sobre `main`).

on:
  push:
    branches: [develop]

jobs:
  test:
    name: Ejecutar tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar todos los tests
        run: ./mvnw -B test
