# Configuración del análisis de SonarCloud (monorepo: backend Java + frontend TS/React).
# El análisis lo lanza el workflow `release.yml` sobre `main` al etiquetar un `deploy-*`.

sonar.projectKey=DarioRJ17_Optima-PC
sonar.organization=optimapc-tfg

# --- Código a analizar ---
# Backend (Java) y frontend (TS/React) en un único proyecto.
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java

# --- Java ---
# El analizador de Java necesita las clases compiladas (las genera `mvnw test`).
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.java.source=21

# --- Cobertura ---
# Informe XML de JaCoCo generado por `mvnw test` (fase test).
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Exclusiones SOLO de cobertura (estas clases se siguen analizando: code smells, bugs...).
# Se reflejan las mismas exclusiones que JaCoCo en el pom.xml para que la cobertura de
# Sonar mida el mismo subconjunto (lógica de negocio), no el boilerplate sin tests:
#   - frontend/**          -> sin tests aún (Vitest pendiente); quitar cuando existan.
#   - **/domain/**         -> entidades de dominio (Lombok, sin lógica).
#   - **/dto/**            -> DTOs / records.
#   - **/config/**         -> configuración.
#   - **/BackendApplication.java -> clase de arranque.
sonar.coverage.exclusions=frontend/**,**/domain/**,**/dto/**,**/config/**,**/BackendApplication.java

sonar.sourceEncoding=UTF-8
