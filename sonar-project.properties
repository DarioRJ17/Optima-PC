# Configuración del análisis de SonarCloud (monorepo: backend Java + frontend TS/React).
# El análisis lo lanza el workflow `ci.yml` en cada push a `develop`.

sonar.projectKey=DarioRJ17_Optima-PC
# Organization Key: la parte anterior al guion bajo de la project key.
# Confírmala en la URL de tu organización: sonarcloud.io/organizations/<ESTO>/...
sonar.organization=DarioRJ17

# --- Código a analizar ---
# Backend (Java) y frontend (TS/React) en un único proyecto.
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java

# --- Java ---
# El analizador de Java necesita las clases compiladas (las genera `mvnw test`).
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.java.source=21

# --- Cobertura ---
# Informe XML de JaCoCo generado por `mvnw test` (fase test).
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# El frontend SÍ se analiza (code smells, bugs, duplicación) pero NO cuenta para la
# cobertura mientras no tenga tests (Vitest pendiente). Cuando exista, quitar esta línea.
sonar.coverage.exclusions=frontend/**

sonar.sourceEncoding=UTF-8
