services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: optimapc_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: optimapc_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ollama-setup:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:7b"]
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: optimapc_pass
      JWT_SECRET: optimapc-tfg-jwt-secret-must-be-at-least-32-characters-long
      OLLAMA_URL: http://ollama:11434/api/chat
      OLLAMA_MODEL: qwen2.5:7b
      FRONTEND_BASE_URL: http://localhost:5173
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM_ADDRESS: ""
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
