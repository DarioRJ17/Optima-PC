spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/optimapc_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-change-in-production-with-at-least-32-characters-long}
jwt.expiration=86400000

# Password reset / email configuration
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from-address=${MAIL_FROM_ADDRESS:${MAIL_USERNAME:}}

# LLM configuration (Groq by default)
llm.url=${LLM_URL:https://api.groq.com/openai/v1/chat/completions}
llm.model=${LLM_MODEL:llama-3.1-8b-instant}
llm.api-key=${LLM_API_KEY:}